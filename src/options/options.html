<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-localize="__MSG_optionsTitle__">SideTimeTableの設定</title>
    <!-- Font Awesome -->
    <link href="https://use.fontawesome.com/releases/v6.7.1/css/all.css" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="../vendor/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <script src="../vendor/popper.min.js"
            integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
            crossorigin="anonymous"></script>
    <script src="../vendor/bootstrap.min.js"
            integrity="sha384-fbbOQedDUMZZ5KreZpsbe1LCZPVmfTnH7ois6mU1QK+m14rQ1l2bGBq41eYeM/fS"
            crossorigin="anonymous"></script>
    <script src="../lib/localize.js"></script>
    <link rel="stylesheet" href="options.css">
    <link rel="stylesheet" href="google_button.css">
    <script src="../../dist/options.bundle.js"></script>
</head>
<body style="opacity: 0;">

<div class="container mt-4">
    <h1 class="mb-4" data-localize="__MSG_optionsTitle__">SideTimeTable 設定</h1>

    <div class="row g-4">
        <!-- 左: nav-pills サイドバー -->
        <div class="col-lg-3 col-md-12">
            <div class="settings-sidebar">
                <div class="nav flex-column nav-pills settings-nav" id="v-pills-tab" role="tablist"
                     aria-orientation="vertical">
                    <button class="nav-link active" id="tab-google-btn" type="button"
                            data-bs-toggle="pill" data-bs-target="#tab-google"
                            role="tab" aria-controls="tab-google" aria-selected="true"
                            data-localize="__MSG_integration__">Google Calendar</button>
                    <button class="nav-link" id="tab-display-btn" type="button"
                            data-bs-toggle="pill" data-bs-target="#tab-display"
                            role="tab" aria-controls="tab-display" aria-selected="false"
                            data-localize="__MSG_displaySettings__">Display</button>
                    <button class="nav-link" id="tab-general-btn" type="button"
                            data-bs-toggle="pill" data-bs-target="#tab-general"
                            role="tab" aria-controls="tab-general" aria-selected="false"
                            data-localize="__MSG_generalSettings__">General</button>
                    <!-- Developer: JS で条件付き表示 -->
                    <button class="nav-link d-none" id="tab-developer-btn" type="button"
                            data-bs-toggle="pill" data-bs-target="#tab-developer"
                            role="tab" aria-controls="tab-developer" aria-selected="false"
                            data-localize="__MSG_developerSettingsTab__">Developer</button>
                </div>
                <!-- コントロールボタン: サイドバー下部 -->
                <div id="control-buttons-container" class="settings-sidebar-actions"></div>
            </div>
        </div>

        <!-- 右: タブコンテンツ -->
        <div class="col-lg-9 col-md-12">
            <div class="tab-content" id="v-pills-tabContent">
                <div class="tab-pane fade show active" id="tab-google"
                     role="tabpanel" aria-labelledby="tab-google-btn"></div>
                <div class="tab-pane fade" id="tab-display"
                     role="tabpanel" aria-labelledby="tab-display-btn"></div>
                <div class="tab-pane fade" id="tab-general"
                     role="tabpanel" aria-labelledby="tab-general-btn"></div>
                <div class="tab-pane fade" id="tab-developer"
                     role="tabpanel" aria-labelledby="tab-developer-btn"></div>
            </div>
        </div>
    </div>

    <datalist id="time-list"></datalist>
</div>

</body>
</html>
